name: Check Taipei Track Field Schedule

# 設計：self-trigger relay 不靠 GHA cron 準時性
#
# 1. cron 只當 cold start fallback：每天 Taipei 15:00 + 16:00 觸發 chain（避開 17:00
#    避免打斷正在 sleep 等 17:00 的 run）
# 2. 主要機制：每個 run 啟動 → 算到下次 Taipei 17:00 的等待秒數 → sleep 到時間 →
#    跑 check.py → 用 GITHUB_TOKEN 呼叫 API 觸發下一個 run → exit
# 3. 如果等待 > GHA timeout (我們設 5h40m)：partial sleep 後直接 relay 接力，
#    新 run 啟動會重新計算等待時間，最終某個 run 等待 < 5h40m 時就會 sleep + 執行
# 4. workflow failure 也會 auto-relay + 推 TG 警告
# 5. concurrency cancel-in-progress 確保只跑一個 run，cron 觸發時 cancel 正在跑的，
#    新 run 重新建 chain
#
# 為什麼不靠 cron：實測 GHA cron 可能延遲 10+ 分鐘甚至跳過整小時，無法保證每天 17:00 推播

on:
  schedule:
    # cold start fallback：Taipei 15:00 / 15:30 / 16:00 / 16:30 共 4 個觸發點。
    # 任一中即可啟動 self-trigger chain，避免單一 cron skip 造成整天漏掉。
    # 故意避開 17:00 之後的時段，以免打斷 chain 中正在 sleep 等 17:00 的 run。
    - cron: "0,30 7,8 * * *"  # UTC 7:00, 7:30, 8:00, 8:30 = Taipei 15:00, 15:30, 16:00, 16:30
  workflow_dispatch:
    inputs:
      force:
        description: "Force notify immediately (skip wait for 17:00)"
        type: boolean
        default: false

permissions:
  contents: write   # commit state.json
  actions: write    # self-trigger relay

concurrency:
  group: tpstadium-bot
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5h55m，留 5 分鐘 margin（GHA free tier job 上限 6h）
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for 17:00 Taipei, run check.py, then relay
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 程式層保險：hour gate 擋掉非預期時段觸發（萬一 sleep 邏輯有 bug 也能擋）
          EXPECTED_HOURS_TAIPEI: "17,18,19,20,21,22,23"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          FORCE_INPUT: ${{ inputs.force }}
        run: |
          set -e

          # ---------- 1. 計算到下次 Taipei 17:00 的等待秒數 ----------
          # 用 -gt 而不是 -ge：剛好在 17:00:00 整啟動的 run 應該立刻執行,不該推到明天。
          NOW_TS=$(date +%s)
          TARGET_TS=$(TZ=Asia/Taipei date -d "today 17:00" +%s)
          if [ "$NOW_TS" -gt "$TARGET_TS" ]; then
            TARGET_TS=$(TZ=Asia/Taipei date -d "tomorrow 17:00" +%s)
          fi
          WAIT=$(( TARGET_TS - NOW_TS ))
          if [ "$WAIT" -lt 0 ]; then WAIT=0; fi  # safety
          echo "Now (Taipei):    $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S')"
          echo "Target (Taipei): $(TZ=Asia/Taipei date -d "@${TARGET_TS}" '+%Y-%m-%d %H:%M:%S')"
          echo "Wait seconds:    ${WAIT}"

          MAX_WAIT=20400   # 5h40m，留 15min 給 check.py + relay + cleanup

          # ---------- 2. force 模式立刻執行；否則 sleep 等到目標 ----------
          if [ "$FORCE_INPUT" = "true" ]; then
            echo "Force mode: 立刻執行 check.py --force（不 sleep）"
            python check.py --force
            EXECUTED=1
          elif [ "$WAIT" -le "$MAX_WAIT" ]; then
            echo "Sleeping ${WAIT}s 直到 Taipei 17:00..."
            sleep "$WAIT"
            echo "Reached target time, 執行 check.py"
            python check.py
            EXECUTED=1
          else
            echo "Wait ${WAIT}s > MAX_WAIT ${MAX_WAIT}s，partial sleep + relay 接力"
            sleep "$MAX_WAIT"
            EXECUTED=0
          fi

          # ---------- 3. 如果有跑 check.py，commit + push state.json ----------
          PUSH_OK=1
          if [ "$EXECUTED" = "1" ] && [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json"
            PUSH_OK=0
            for i in 1 2 3; do
              if git push; then
                echo "git push 成功 (attempt $i)"
                PUSH_OK=1
                break
              fi
              echo "git push 失敗 (attempt $i)，pull --rebase 後重試"
              git pull --rebase --strategy-option=ours || true
              sleep 2
            done
            # state push 失敗 → 推 TG 警告(避免下次重複推時 user 困惑為什麼又出狀況)
            if [ "$PUSH_OK" = "0" ]; then
              echo "❌ state.json push 3 次都失敗"
              MSG=$(printf '⚠️ tpstadium-bot:推播已成功送達,但 state.json git push 失敗(3 次重試後放棄)。\n下個 run 可能會重複推一次同樣的訊息(因為去重 state 沒持久化)。這是已知 trade-off,不是新 bug。\nrun: %s' "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
              curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${MSG}" \
                --data-urlencode "disable_web_page_preview=true" >/dev/null || true
            fi
          fi

          # ---------- 4. self-trigger relay 接力下一個 run ----------
          echo "觸發下一個 run (self-trigger relay)..."
          RELAY_OK=0
          for i in 1 2 3; do
            HTTP=$(curl -sS -o /tmp/relay.json -w "%{http_code}" -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/actions/workflows/check.yml/dispatches" \
              -d '{"ref":"main"}' || echo "curl_failed")
            echo "Relay attempt $i: HTTP=${HTTP}"
            if [ "$HTTP" = "204" ]; then
              echo "✅ Relay 成功"
              RELAY_OK=1
              break
            fi
            cat /tmp/relay.json 2>/dev/null || true
            if [ "$i" -lt 3 ]; then
              sleep 5
            fi
          done
          # Relay 三次都失敗 → exit 1 觸發 if:failure() auto-relay + TG alert,
          # 不要默默結束讓 chain 無聲斷掉。
          if [ "$RELAY_OK" = "0" ]; then
            echo "❌ All 3 relay attempts failed; exit 1 to trigger if:failure() handler"
            exit 1
          fi

      - name: Notify on workflow failure + auto-relay
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # 嘗試 auto-relay 接班（即使這次失敗，下個 run 仍能繼續 chain）
          RELAY_HTTP=$(curl -sS -o /tmp/relay.json -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/actions/workflows/check.yml/dispatches" \
            -d '{"ref":"main"}' || echo "curl_failed")
          if [ "$RELAY_HTTP" = "204" ]; then
            RELAY_NOTE="已自動觸發接班 run"
          else
            RELAY_NOTE="自動接班失敗 (HTTP ${RELAY_HTTP})，等 cron fallback (Taipei 15:00 / 16:00) 接手"
          fi
          MSG=$(printf '⚠️ tpstadium-bot workflow 失敗\nrun: %s\n%s' "${RUN_URL}" "${RELAY_NOTE}")
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" >/dev/null || true
