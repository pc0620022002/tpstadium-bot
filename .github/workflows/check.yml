name: Check Taipei Track Field Schedule

on:
  schedule:
    # 多觸發點冗餘設計，分兩層：
    #   (1) 主要時段 Taipei 17:00-17:50 每 10 分鐘觸發 → UTC 9:00, 9:10, ..., 9:50
    #   (2) Fallback 時段 Taipei 18:00-23:00 每小時觸發 → UTC 10:00, 11:00, ..., 15:00
    # GHA cron 對 free tier 不保證準時(實測偶爾延遲幾十分鐘、甚至跳過整個小時),
    # 多觸發點 + 寬鬆 hour gate(EXPECTED_HOURS_TAIPEI=17-23)+ 同日去重,
    # 確保「就算 17 點那一小時 GHA 完全 skip,後面也會有 cron 中,當天保證會收到」。
    # 同日去重保證最多發一次,即使 13 個觸發點中多個都成功觸發。
    - cron: "0,10,20,30,40,50 9 * * *"
    - cron: "0 10,11,12,13,14,15 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force notify even if PDF URL unchanged"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing state.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 程式層保險：只允許這些 Taipei 小時觸發推播。
          # GHA 改 cron 後內部排程可能卡舊版,讓程式自己擋掉非預期時段觸發。
          # 範圍 17-23 對應上面的 cron 觸發點(主要 17 點 + fallback 18-23 點)。
          # 改推播時間時，這裡跟上面 cron 要一起改。
          EXPECTED_HOURS_TAIPEI: "17,18,19,20,21,22,23"
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python check.py --force
          else
            python check.py
          fi

      - name: Commit state.json if changed
        if: success()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json"
            git push
          else
            echo "No state change"
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠️ tpstadium-bot GHA run 失敗 (${GITHUB_RUN_ID})。check.py 沒能完成。Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" || true
