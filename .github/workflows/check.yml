name: Check Taipei Track Field Schedule

on:
  schedule:
    # 09:00 + 10:00 UTC = 17:00 + 18:00 Taipei.
    # 第二次跑是備援,在 GHA 延遲/跳過 17:00 那次時補發;
    # check.py 會用 state.last_notify_date 去重,所以 17:00 成功時 18:00 會安靜結束。
    - cron: "0 9,10 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force notify even if PDF URL unchanged"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing state.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 程式層保險：只允許這些 Taipei 小時觸發推播。
          # GHA 改 cron 後內部排程可能卡舊版,讓程式自己擋掉非預期時段觸發。
          # 改推播時間時，這裡跟上面 cron 要一起改。
          EXPECTED_HOURS_TAIPEI: "17,18"
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python check.py --force
          else
            python check.py
          fi

      - name: Commit state.json if changed
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json"
            git push
          else
            echo "No state change"
          fi
