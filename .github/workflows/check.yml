name: Check Taipei Track Field Schedule

on:
  schedule:
    # 00:00 UTC = 08:00 Taipei. Runs once a day.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force notify even if PDF URL unchanged"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing state.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python check.py --force
          else
            python check.py
          fi

      - name: Commit state.json if changed
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json"
            git push
          else
            echo "No state change"
          fi
