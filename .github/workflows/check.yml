name: Check Taipei Track Field Schedule

on:
  schedule:
    # 多個觸發點冗餘設計：UTC 9:00, 9:10, 9:20, 9:30, 9:40, 9:50, 10:00
    #   = Taipei 17:00, 17:10, 17:20, 17:30, 17:40, 17:50, 18:00
    # GHA cron 對 free tier 不保證準時(實測偶爾延遲 5~30 分鐘甚至更久),
    # 列多個觸發點降低「單一 cron 沒觸發 → user 整天沒收到」的風險。
    # check.py 的 EXPECTED_HOURS_TAIPEI(17,18)+ 同日去重,確保最多一天發一次。
    - cron: "0,10,20,30,40,50 9 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force notify even if PDF URL unchanged"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing state.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 程式層保險：只允許這些 Taipei 小時觸發推播。
          # GHA 改 cron 後內部排程可能卡舊版,讓程式自己擋掉非預期時段觸發。
          # 改推播時間時，這裡跟上面 cron 要一起改。
          EXPECTED_HOURS_TAIPEI: "17,18"
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python check.py --force
          else
            python check.py
          fi

      - name: Commit state.json if changed
        if: success()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json"
            git push
          else
            echo "No state change"
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠️ tpstadium-bot GHA run 失敗 (${GITHUB_RUN_ID})。check.py 沒能完成。Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" || true
